<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NeuroFit 365 — Latihan Otak & Neuroplastisitas</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #f0f2f5;
  --glass: rgba(255,255,255,0.55);
  --glass-border: rgba(255,255,255,0.35);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.06);
  --text: #1a1a2e;
  --text2: #555;
  --text3: #999;
  --accent-brain: #00b894;
  --accent-brain2: #00d2a0;
  --accent-ed: #e17055;
  --accent-ed2: #f08a72;
  --card-bg: rgba(255,255,255,0.65);
  --input-bg: rgba(255,255,255,0.5);
  --hover: rgba(0,0,0,0.04);
  --danger: #d63031;
  --success: #00b894;
  --warning: #fdcb6e;
  --modal-overlay: rgba(0,0,0,0.5);
}
[data-theme="dark"] {
  --bg: #0f0f1a;
  --glass: rgba(30,30,50,0.7);
  --glass-border: rgba(255,255,255,0.08);
  --glass-shadow: 0 8px 32px rgba(0,0,0,0.3);
  --text: #e8e8f0;
  --text2: #999;
  --text3: #555;
  --card-bg: rgba(30,30,50,0.65);
  --input-bg: rgba(255,255,255,0.08);
  --hover: rgba(255,255,255,0.04);
  --modal-overlay: rgba(0,0,0,0.7);
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);line-height:1.6;transition:background .3s,color .3s;min-height:100vh}
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-thumb{background:var(--text3);border-radius:4px}
.glass{background:var(--glass);backdrop-filter:blur(16px);-webkit-backdrop-filter:blur(16px);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);border-radius:16px}
.glass-card{background:var(--card-bg);backdrop-filter:blur(12px);-webkit-backdrop-filter:blur(12px);border:1px solid var(--glass-border);box-shadow:var(--glass-shadow);border-radius:16px;padding:20px;transition:all .3s}
.glass-card:hover{box-shadow:0 12px 40px rgba(0,0,0,0.1)}
*:focus-visible{outline:2px solid var(--accent-brain);outline-offset:2px;border-radius:4px}
button{touch-action:manipulation;cursor:pointer}
.nav-item:focus-visible{outline-offset:-2px}

.topbar{position:sticky;top:0;z-index:100;padding:10px 16px;display:flex;align-items:center;justify-content:space-between;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--glass-border);gap:8px}
.topbar h1{font-size:1.15em;font-weight:700;background:linear-gradient(135deg,var(--accent-brain),var(--accent-ed));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;white-space:nowrap}
.topbar-actions{display:flex;gap:6px;align-items:center}
.topbar-btn{background:var(--card-bg);border:1px solid var(--glass-border);color:var(--text);width:36px;height:36px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.1em;transition:all .2s}
.topbar-btn:hover{background:var(--hover);transform:scale(1.05)}

.module-tag{display:inline-block;font-size:0.65em;padding:2px 8px;border-radius:6px;font-weight:700;margin-left:6px;letter-spacing:.3px;text-transform:uppercase}
.module-tag.brain{background:var(--accent-brain);color:#fff}
.module-tag.ed{background:var(--accent-ed);color:#fff}

.container{max-width:640px;margin:0 auto;padding:12px 16px 80px}

.dashboard{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px}
.db-card{text-align:center;padding:14px 10px}
.db-card .num{font-size:1.6em;font-weight:800;line-height:1.2}
.db-card .lbl{font-size:0.75em;color:var(--text2);text-transform:uppercase;letter-spacing:.5px;margin-top:2px}
.db-ring{position:relative;width:72px;height:72px;margin:0 auto}
.db-ring svg{width:72px;height:72px;transform:rotate(-90deg)}
.db-ring circle{fill:none;stroke-width:6;stroke:var(--text3);opacity:.2}
.db-ring circle.prog{stroke-linecap:round;transition:stroke-dashoffset .6s ease}
.db-ring .ctr{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:.85em;font-weight:700}
.prog-brain circle.prog{stroke:var(--accent-brain)}
.prog-ed circle.prog{stroke:var(--accent-ed)}

.day-section{margin-bottom:14px}
.day-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.day-header h2{font-size:1em;font-weight:600}
.day-header .day-num{font-size:0.8em;color:var(--text2);background:var(--card-bg);padding:2px 10px;border-radius:8px}
.day-progress{display:flex;align-items:center;gap:6px;font-size:0.8em;color:var(--text2);margin-bottom:10px}
.day-progress .bar-track{flex:1;height:6px;background:var(--input-bg);border-radius:3px;overflow:hidden}
.day-progress .bar-fill{height:100%;border-radius:3px;transition:width .4s;background:linear-gradient(90deg,var(--success),var(--accent-brain))}

.sub-card{margin-bottom:10px;padding:16px;border:1px solid var(--glass-border);border-radius:12px;background:var(--input-bg);transition:all .2s}
.sub-card:last-child{margin-bottom:0}
.sub-card.done{opacity:.65}
.sub-card h4{font-size:0.95em;font-weight:700;margin-bottom:2px}
.sub-card .meta{font-size:0.75em;color:var(--text2);margin-bottom:8px}
.sub-card .actions{display:flex;gap:6px;flex-wrap:wrap;margin:8px 0}
.sub-card .actions button{flex:1;min-width:60px;padding:8px 10px;border:none;border-radius:8px;font-size:0.78em;font-weight:600;transition:all .2s;color:var(--text)}
.sub-card .actions .tbtn-act{background:var(--card-bg);border:1px solid var(--glass-border)}
.sub-card .actions .tbtn-act.active-timer{background:var(--accent-brain);color:#fff}
.sub-card .actions .info-btn{background:var(--card-bg);border:1px solid var(--glass-border)}
.sub-card .actions .done-btn{background:var(--success);color:#fff;opacity:.5}
.sub-card .actions .done-btn.can-do{opacity:1}
.sub-card .actions .done-btn:active{transform:scale(.95)}
.sub-card .steps{margin:6px 0 0;list-style:none;font-size:0.78em}
.sub-card .steps li{display:flex;align-items:flex-start;gap:8px;padding:4px 0;cursor:pointer;color:var(--text2)}
.sub-card .steps li .cb{width:16px;height:16px;border-radius:4px;border:2px solid var(--text3);flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:0.6em;transition:all .2s;margin-top:1px}
.sub-card .steps li.done .cb{background:var(--success);border-color:var(--success);color:#fff}
.sub-card .steps li.done{opacity:.5;text-decoration:line-through}
.sub-card .ex-note{width:100%;padding:6px 10px;border-radius:6px;border:1px solid var(--glass-border);background:var(--card-bg);color:var(--text);font-size:0.78em;resize:none;min-height:36px;margin:6px 0;font-family:inherit}
.sub-card .ex-note:focus{outline:none;border-color:var(--accent-brain)}
.timer-label{font-size:0.75em;color:var(--text2);margin:4px 0 2px;display:flex;align-items:center;gap:6px}
.timer-label.active{color:var(--accent-brain);font-weight:600}

.cal-wrap{margin:14px 0}
.cal-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(18px,1fr));gap:3px;margin-top:8px}
.cal-day{width:100%;aspect-ratio:1;border-radius:4px;font-size:0.6em;display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .15s;color:transparent;min-height:18px;min-width:18px}
.cal-day.done{background:var(--accent-brain);color:#fff}
.cal-day.partial{background:var(--warning);opacity:.7;color:#fff}
.cal-day.miss{background:var(--danger);opacity:.5}
.cal-day.today{outline:2px solid var(--text);outline-offset:1px}
.cal-day.empty{background:transparent;cursor:default}
.cal-legend{display:flex;gap:12px;margin-top:6px;font-size:0.7em;color:var(--text2);align-items:center;flex-wrap:wrap}
.cal-legend span{display:flex;align-items:center;gap:4px}
.cal-legend .sq{width:12px;height:12px;border-radius:2px}

.stats-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin:8px 0}
.stat-item{text-align:center;padding:10px 4px}
.stat-item .snum{font-size:1.2em;font-weight:700}
.stat-item .slbl{font-size:0.65em;color:var(--text2);text-transform:uppercase;letter-spacing:.3px;margin-top:1px}
.chart-bar{display:flex;gap:4px;align-items:flex-end;height:60px;margin:10px 0}
.chart-bar .bar{flex:1;border-radius:3px 3px 0 0;min-height:4px;transition:height .4s;position:relative}
.chart-bar .bar.brain-bar{background:var(--accent-brain)}
.chart-bar .bar.ed-bar{background:var(--accent-ed)}
.chart-bar .bar .bl{position:absolute;bottom:-16px;left:50%;transform:translateX(-50%);font-size:0.55em;color:var(--text3);white-space:nowrap}

.journal-list{max-height:200px;overflow-y:auto;margin:6px 0}
.journal-item{padding:8px 10px;border-bottom:1px solid var(--glass-border);font-size:0.82em}
.journal-item:last-child{border:none}
.journal-item .jdate{font-size:0.75em;color:var(--text3)}
.journal-item .jnote{color:var(--text2);margin-top:2px}

.setting-item{display:flex;justify-content:space-between;align-items:center;padding:12px 0;border-bottom:1px solid var(--glass-border)}
.setting-item:last-child{border:none}
.setting-item label{font-size:0.88em;font-weight:500}
.setting-item input[type="time"],.setting-item input[type="text"]{background:var(--input-bg);border:1px solid var(--glass-border);border-radius:8px;padding:6px 10px;color:var(--text);font-size:0.85em;font-family:inherit}
.setting-item input:focus{outline:none;border-color:var(--accent-brain)}
.toggle-track{width:42px;height:24px;background:var(--text3);border-radius:12px;cursor:pointer;position:relative;transition:all .2s;flex-shrink:0}
.toggle-track.on{background:var(--accent-brain)}
.toggle-track::after{content:'';position:absolute;top:2px;left:2px;width:20px;height:20px;border-radius:50%;background:#fff;transition:all .2s}
.toggle-track.on::after{left:20px}
.btn-danger{background:var(--danger);color:#fff;border:none;padding:8px 16px;border-radius:8px;font-weight:600;font-size:0.85em}
.hidden{display:none!important}
.fade-in{animation:fadeIn .3s ease}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}

.toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%);background:var(--text);color:#fff;padding:12px 24px;border-radius:12px;font-size:0.85em;z-index:999;opacity:0;transition:all .4s;pointer-events:none;max-width:90%;text-align:center;box-shadow:0 8px 24px rgba(0,0,0,.2)}
.toast.show{opacity:1}
.toast.success{background:var(--accent-brain)}

.empty-state{text-align:center;padding:40px 20px;color:var(--text2)}
.empty-state .icon{font-size:3em;margin-bottom:10px}

.bottom-nav{position:fixed;bottom:0;left:0;right:0;z-index:100;display:flex;background:var(--glass);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-top:1px solid var(--glass-border);padding:6px 0 env(safe-area-inset-bottom,6px) 0}
.nav-item{flex:1;text-align:center;padding:6px 0;cursor:pointer;color:var(--text3);font-size:0.65em;transition:all .2s;border:none;background:none;font-weight:500;text-transform:uppercase;letter-spacing:.3px}
.nav-item .ni{font-size:1.3em;display:block;margin-bottom:1px}
.nav-item.active{color:var(--accent-brain)}
.nav-item.active.ed-active{color:var(--accent-ed)}

/* MODAL */
.modal-overlay{position:fixed;inset:0;z-index:200;background:var(--modal-overlay);display:flex;align-items:flex-end;justify-content:center;padding:0;animation:modalIn .25s ease}
.modal-overlay.closing{animation:modalOut .2s ease}
@keyframes modalIn{from{opacity:0}to{opacity:1}}
@keyframes modalOut{from{opacity:1}to{opacity:0}}
.modal-content{background:var(--card-bg);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:20px 20px 0 0;max-width:640px;width:100%;max-height:85vh;overflow-y:auto;padding:24px 20px env(safe-area-inset-bottom,24px);animation:slideUp .3s ease;border-top:1px solid var(--glass-border)}
.modal-overlay.closing .modal-content{animation:slideDown .2s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes slideDown{from{transform:translateY(0)}to{transform:translateY(100%)}}
.modal-close{position:sticky;top:0;float:right;background:var(--input-bg);border:none;border-radius:50%;width:32px;height:32px;display:flex;align-items:center;justify-content:center;font-size:1em;color:var(--text);transition:all .2s}
.modal-close:hover{background:var(--hover);transform:scale(1.1)}
.modal-content h3{font-size:1.15em;font-weight:700;margin-bottom:12px;padding-right:40px}
.modal-section{margin-bottom:16px}
.modal-section h4{font-size:0.85em;font-weight:700;color:var(--accent-brain);text-transform:uppercase;letter-spacing:.5px;margin-bottom:4px}
.modal-section p,.modal-section li{font-size:0.85em;color:var(--text2);line-height:1.6}
.modal-section ul{list-style:none}
.modal-section ul li{padding:2px 0;padding-left:16px;position:relative}
.modal-section ul li::before{content:'•';position:absolute;left:4px;color:var(--accent-brain)}
.modal-video{margin:6px 0;display:block}
.modal-video a{display:flex;align-items:center;gap:8px;padding:8px 12px;background:var(--input-bg);border-radius:8px;text-decoration:none;color:var(--text);font-size:0.82em;transition:all .2s;margin-bottom:4px}
.modal-video a:hover{background:var(--hover);transform:translateX(2px)}
.modal-ref{font-size:0.78em;color:var(--text3);padding:8px 10px;background:var(--input-bg);border-radius:8px;border-left:3px solid var(--accent-brain);margin-top:6px;line-height:1.5}

@media(max-width:480px){
  .dashboard{grid-template-columns:1fr 1fr}
  .stats-grid{grid-template-columns:1fr 1fr}
  .cal-grid{grid-template-columns:repeat(auto-fill,minmax(16px,1fr));gap:2px}
  .topbar h1{font-size:1em}
  .sub-card .actions button{font-size:0.72em;padding:6px 8px}
}
</style>
</head>
<body>

<div class="topbar">
  <h1>NeuroFit 365</h1>
  <div class="topbar-actions">
    <button class="topbar-btn" onclick="toggleTheme()" aria-label="Ganti tema gelap/terang">🌙</button>
    <button class="topbar-btn" onclick="showSection('settings')" aria-label="Pengaturan">⚙️</button>
  </div>
</div>

<div class="container" id="app">

  <div class="dashboard" id="dashboard">
    <div class="glass-card db-card">
      <div class="db-ring prog-brain">
        <svg><circle r="30" cx="36" cy="36"/><circle class="prog" r="30" cx="36" cy="36" stroke-dasharray="188.5" stroke-dashoffset="188.5"/></svg>
        <div class="ctr"><span id="brainPct">0%</span></div>
      </div>
      <div class="lbl">Otak</div>
    </div>
    <div class="glass-card db-card">
      <div class="db-ring prog-ed">
        <svg><circle r="30" cx="36" cy="36"/><circle class="prog" r="30" cx="36" cy="36" stroke-dasharray="188.5" stroke-dashoffset="188.5"/></svg>
        <div class="ctr"><span id="edPct">0%</span></div>
      </div>
      <div class="lbl">ED</div>
    </div>
    <div class="glass-card db-card">
      <div class="num" id="streakNum">0</div>
      <div class="lbl">🔥 Streak</div>
    </div>
    <div class="glass-card db-card">
      <div class="num" id="dayNum">Hari ke-1</div>
      <div class="lbl" id="dayLabel">dari 365</div>
    </div>
  </div>

  <div id="todaySection"></div>

  <div class="glass-card" id="calSection">
    <h2 style="font-size:.95em;font-weight:600;margin-bottom:6px">📅 Progress 365 Hari</h2>
    <div class="cal-legend">
      <span><span class="sq" style="background:var(--accent-brain)"></span> Selesai</span>
      <span><span class="sq" style="background:var(--warning)"></span> Sebagian</span>
      <span><span class="sq" style="background:var(--danger);opacity:.5"></span> Terlewat</span>
      <span><span class="sq" style="background:var(--text3);opacity:.1"></span> Belum</span>
    </div>
    <div class="cal-wrap" id="calWrap"></div>
  </div>

  <div class="glass-card" id="statsSection" style="margin-top:14px">
    <h2 style="font-size:.95em;font-weight:600;margin-bottom:6px">📊 Statistik</h2>
    <div class="stats-grid" id="statsGrid"></div>
    <div class="chart-bar" id="chartBar"></div>
  </div>

  <div class="glass-card" id="journalSection" style="margin-top:14px">
    <h2 style="font-size:.95em;font-weight:600;margin-bottom:6px">📝 Jurnal Latihan</h2>
    <div class="journal-list" id="journalList"><div class="empty-state">Belum ada catatan</div></div>
  </div>

  <div class="glass-card hidden" id="settingsSection">
    <h2 style="font-size:.95em;font-weight:600;margin-bottom:12px">⚙️ Pengaturan</h2>
    <div class="setting-item">
      <label>Nama Anda</label>
      <input type="text" id="userName" placeholder="User" onchange="saveSettings()" style="width:140px">
    </div>
    <div class="setting-item">
      <label>Pengingat harian</label>
      <div style="display:flex;align-items:center;gap:8px">
        <div class="toggle-track" id="reminderToggle" onclick="toggleReminder()"></div>
        <input type="time" id="reminderTime" value="08:00" onchange="saveSettings()">
      </div>
    </div>
    <div class="setting-item">
      <label>Notifikasi browser</label>
      <button class="topbar-btn" style="width:auto;padding:4px 14px;font-size:0.75em" onclick="requestNotif()" aria-label="Izinkan notifikasi browser">IZINKAN</button>
    </div>
    <div class="setting-item">
      <label>Reset semua data</label>
      <button class="btn-danger" onclick="resetData()" aria-label="Hapus semua data">HAPUS</button>
    </div>
    <div class="setting-item">
      <label>Backup data</label>
      <button class="topbar-btn" style="width:auto;padding:4px 14px;font-size:0.75em" onclick="exportData()">DOWNLOAD JSON</button>
    </div>
  </div>
</div>

<div class="bottom-nav">
  <button class="nav-item active" data-nav="today" onclick="showSection('today')" aria-label="Latihan hari ini"><span class="ni">🏋️</span>Latihan</button>
  <button class="nav-item" data-nav="cal" onclick="showSection('cal')" aria-label="Kalender progress"><span class="ni">📅</span>Kalender</button>
  <button class="nav-item" data-nav="stats" onclick="showSection('stats')" aria-label="Statistik"><span class="ni">📊</span>Statistik</button>
  <button class="nav-item" data-nav="journal" onclick="showSection('journal')" aria-label="Jurnal latihan"><span class="ni">📝</span>Jurnal</button>
</div>

<div class="toast" id="toast"></div>

<!-- MODAL INFO -->
<div class="modal-overlay hidden" id="infoModal">
  <div class="modal-content" id="infoModalContent"></div>
</div>

<script>
const DAYS = ['Minggu','Senin','Selasa','Rabu','Kamis','Jumat','Sabtu'];

function scaleDur(base, level){
  return base + (level-1) * 5;
}

// ============================
// BRAIN SCHEDULE (7 hari × 2-3 exercise)
// ============================
const brainSchedule = [
  [ // 0: Senin — FINGER Protocol + Dual N-Back
    { id:'ex_0', cat:'Multi-Domain', emoji:'🌿', name:'FINGER Protocol (Jalan + Kognitif)', dur:45,
      desc:'Kombinasi jalan cepat 30 menit + latihan kognitif 15 menit + catat asupan nutrisi.',
      ref:'Ngandu et al. 2015, The Lancet — Multi-domain intervention memperlambat penurunan kognitif 25%. DOI: 10.1016/S0140-6736(15)60461-5',
      steps:['Jalan cepat 30 menit (denyut naik)','Latihan kognitif 15 menit (aplikasi/soal)','Catat 1 porsi sayur/buah yang dimakan'],
      explanation:'FINGER (Finnish Geriatric Intervention Study to Prevent Cognitive Impairment and Disability) adalah studi multidomain pertama yang membuktikan bahwa kombinasi exercise aerobik, diet, latihan kognitif, dan monitoring faktor risiko bisa memperlambat penurunan kognitif hingga 25%. Protokol ini menggabungkan aktivitas fisik aerobik dengan latihan kognitif terstruktur.',
      benefits:['Memperlambat penurunan kognitif 25% (Ngandu 2015)','Meningkatkan fungsi eksekutif dan kecepatan prosesing','Mengombinasikan manfaat fisik + kognitif dalam satu sesi'],
      tips:['Gunakan aplikasi brain training untuk sesi kognitif','Pilih rute jalan yang bervariasi untuk stimulasi tambahan','Lakukan di pagi hari untuk konsistensi lebih baik'],
      videoLinks:[
        { title:'FINGER Study Explained (English)', url:'https://www.youtube.com/results?search_query=FINGER+study+cognitive+training' },
        { title:'Latihan Kognitif untuk Pemula', url:'https://www.youtube.com/results?search_query=latihan+kognitif+otak' }
      ]},
    { id:'ex_1', cat:'Working Memory', emoji:'🧠', name:'Dual N-Back Training', dur:15,
      desc:'Latihan working memory adaptif yang meningkatkan BDNF dan fluid intelligence.',

// ============================
// STATE
// ============================
let state = {
  brain: JSON.parse(localStorage.getItem('nf_brain')) || {},
  ed: JSON.parse(localStorage.getItem('nf_ed')) || {},
  settings: JSON.parse(localStorage.getItem('nf_settings')) || { name:'User', reminder:false, reminderTime:'08:00', dark:false },
  startDate: localStorage.getItem('nf_start') || (() => { const d = new Date(); d.setDate(d.getDate()+1); return d.toISOString().split('T')[0]; })(),
  currentSection: 'today',
  calView: 'brain',
  timerInterval: null,
  timerRunning: false,
  timerSeconds: 0,
  timerOriginal: 0,
  timerExerciseId: null
};

// Migration: detect old format (flat completed bool) → reset
function migrateData(){
  const sample = state.brain[Object.keys(state.brain)[0]];
  if (sample && typeof sample.completed === 'boolean'){
    if (confirm('Data terdeteksi dari versi lama. Reset untuk struktur baru? (progress lama akan dibackup otomatis)')) exportData(true);
    state.brain = {};
    state.ed = {};
  }
}

function saveState(){
  localStorage.setItem('nf_brain', JSON.stringify(state.brain));
  localStorage.setItem('nf_ed', JSON.stringify(state.ed));
  localStorage.setItem('nf_settings', JSON.stringify(state.settings));
  localStorage.setItem('nf_start', state.startDate);
}

// ============================
// HELPERS
// ============================
function dayIndex(dateStr){
  const start = new Date(state.startDate);
  const now = dateStr ? new Date(dateStr) : new Date();
  const diff = Math.floor((now - start) / (1000*60*60*24));
  return Math.max(0, diff);
}

function getCombinedExercises(day){
  const brain = brainSchedule[day % 7].map(ex => ({...ex, module: 'brain'}));
  const ed = edSchedule[day % 7].map(ex => ({...ex, module: 'ed'}));
  return [...brain, ...ed];
}

function getDayKey(module, idx){
  return `day_${idx}`;
}

function getLevel(today){
  return Math.min(13, Math.floor(today/28)+1);
}

function formatTime(sec){
  const m = Math.floor(sec/60);
  const s = sec%60;
  return `${m.toString().padStart(2,'0')}:${s.toString().padStart(2,'0')}`;
}

function countDayExercises(module, dayData){
  if (!dayData) return { done: 0, total: 0 };
  const total = Object.keys(dayData).length;
  const done = Object.values(dayData).filter(d => d?.completed).length;
  return { done, total };
}

// ============================
// RENDER
// ============================
function render(){
  const today = dayIndex();
  const level = getLevel(today);
  const exercises = getCombinedExercises(today);
  const dayName = DAYS[new Date().getDay()];

  // Count across both modules
  let allDone = 0, allTotal = exercises.length;
  const brainKey = getDayKey('brain', today);
  const edKey = getDayKey('ed', today);
  const brainData = state.brain[brainKey] || {};
  const edData = state.ed[edKey] || {};
  exercises.forEach(ex => {
    const d = ex.module === 'brain' ? brainData[ex.id] : edData[ex.id];
    if (d?.completed) allDone++;
  });

  // Dashboard — combined
  const brainEx = countAllExercises('brain');
  const edEx = countAllExercises('ed');
  const brainStreak = calcStreak('brain');
  const edStreak = calcStreak('ed');
  const totalEx = brainEx + edEx;
  const combStreak = Math.max(brainStreak, edStreak);
  document.getElementById('streakNum').textContent = combStreak;
  document.getElementById('dayNum').textContent = `Hari ke-${today+1}`;
  document.getElementById('dayLabel').textContent = `Level ${level} · ${totalEx} exercise`;

  const bpct = Math.min(100, Math.round((brainEx/365)*100));
  const epct = Math.min(100, Math.round((edEx/365)*100));
  const circ = 188.5;
  document.querySelector('.prog-brain circle.prog').style.strokeDashoffset = circ - (circ * bpct / 100);
  document.querySelector('.prog-ed circle.prog').style.strokeDashoffset = circ - (circ * epct / 100);
  document.getElementById('brainPct').textContent = bpct+'%';
  document.getElementById('edPct').textContent = epct+'%';

  // Today section
  let html = `<div class="glass-card day-card"><div class="day-header"><h2>📍 ${dayName} · Level ${level}</h2><span class="day-num">Hari #${today+1}</span></div>`;
  const pctDone = allTotal > 0 ? Math.round(allDone/allTotal*100) : 0;
  html += `<div class="day-progress"><span>${allDone}/${allTotal} selesai</span><div class="bar-track"><div class="bar-fill" style="width:${pctDone}%"></div></div><span>${pctDone}%</span></div>`;

  exercises.forEach((ex, i) => {
    const exData = ex.module === 'brain' ? brainData[ex.id] : edData[ex.id];
    const exDone = exData?.completed || false;
    const dur = scaleDur(ex.dur, level);
    const exFullId = `${ex.module}_${today}_${ex.id}`;
    const isTimerActive = state.timerRunning && state.timerExerciseId === exFullId;
    const modCls = ex.module === 'brain' ? 'brain' : 'ed';
    html += `<div class="sub-card ${exDone?'done':''}">
      <h4>${ex.emoji} ${ex.name}<span class="module-tag ${modCls}">${ex.module==='brain'?'🧠 Otak':'❤️‍🔥 ED'}</span></h4>
      <div class="meta">${ex.cat} · ⏱ ${dur} menit</div>`;
    if (isTimerActive){
      html += `<div class="timer-label active">⏱️ Timer: ${ex.name} (${formatTime(state.timerSeconds)})</div>`;
    }
    const idx = i;
    html += `<div class="actions">
      <button class="tbtn-act ${isTimerActive?'active-timer':''}" onclick="toggleTimer(${idx})" aria-label="Timer ${ex.name}">${isTimerActive?'⏸️':'▶️'} Timer</button>
      <button class="info-btn" onclick="openInfo(${today%7},${i})" aria-label="Info ${ex.name}">ℹ️ Info</button>
      <button class="done-btn ${!exDone?'can-do':''}" onclick="completeExercise(${idx})" ${exDone?'disabled':''}>${exDone?'✅':'☐'} Selesai</button>
    </div>`;
    if (!exDone){
      html += `<ul class="steps">${ex.steps.map(s => `<li onclick="this.classList.toggle('done');this.querySelector('.cb').textContent=this.classList.contains('done')?'✓':''"><span class="cb"></span><span>${s}</span></li>`).join('')}</ul>`;
    }
    html += `<textarea class="ex-note" placeholder="Catatan..." onchange="saveNote(${idx},this.value)">${exData?.note||''}</textarea>`;
    html += `</div>`;
  });

  html += `<div class="ref" style="font-size:0.78em;color:var(--text2);margin-top:10px;padding:8px 10px;background:var(--input-bg);border-radius:8px;border-left:3px solid var(--text3)">📄 Level ${level} · Durasi exercise naik +${(level-1)*5} menit dari base. 🧠 Otak + ❤️‍🔥 ED dalam satu sesi.</div>`;
  html += `</div>`;
  document.getElementById('todaySection').innerHTML = html;

  if (!state.timerRunning){
    state.timerSeconds = scaleDur(exercises[0].dur, level)*60;
    state.timerOriginal = scaleDur(exercises[0].dur, level)*60;
    state.timerExerciseId = null;
  }

  renderCal();
  renderStats();
  renderJournal();
  updateNav();
}

function saveNote(exIdx, val){
  const today = dayIndex();
  const ex = getCombinedExercises(today)[exIdx];
  const key = getDayKey(ex.module, today);
  if (!state[ex.module][key]) state[ex.module][key] = {};
  if (!state[ex.module][key][ex.id]) state[ex.module][key][ex.id] = {};
  state[ex.module][key][ex.id].note = val;
  saveState();
}

// ============================
// TIMER
// ============================
function toggleTimer(exIdx){
  const today = dayIndex();
  const level = getLevel(today);
  const ex = getCombinedExercises(today)[exIdx];
  const exFullId = `${ex.module}_${today}_${ex.id}`;

  if (state.timerRunning && state.timerExerciseId === exFullId){
    clearInterval(state.timerInterval);
    state.timerRunning = false;
    state.timerExerciseId = null;
    render();
    return;
  }

  clearInterval(state.timerInterval);
  state.timerSeconds = scaleDur(ex.dur, level)*60;
  state.timerOriginal = scaleDur(ex.dur, level)*60;
  state.timerRunning = true;
  state.timerExerciseId = exFullId;

  state.timerInterval = setInterval(() => {
    if (state.timerSeconds <= 0){
      clearInterval(state.timerInterval);
      state.timerRunning = false;
      state.timerExerciseId = null;
      showToast('⏰ Timer selesai!','success');
      render();
      return;
    }
    state.timerSeconds--;
    const label = document.querySelector('.timer-label.active');
    if (label) label.textContent = `⏱️ Timer: ${ex.name} (${formatTime(state.timerSeconds)})`;
  }, 1000);
  render();
}

// ============================
// COMPLETE EXERCISE
// ============================
function completeExercise(exIdx){
  const today = dayIndex();
  const ex = getCombinedExercises(today)[exIdx];
  const key = getDayKey(ex.module, today);
  if (!state[ex.module][key]) state[ex.module][key] = {};
  if (state[ex.module][key][ex.id]?.completed) return;

  clearInterval(state.timerInterval);
  state.timerRunning = false;
  state.timerExerciseId = null;

  state[ex.module][key][ex.id] = {
    completed: true,
    completedAt: new Date().toISOString(),
    note: state[ex.module][key][ex.id]?.note || ''
  };
  saveState();

  const allEx = getCombinedExercises(today);
  let done = 0;
  const bKey = getDayKey('brain', today), eKey = getDayKey('ed', today);
  allEx.forEach(ex => {
    const d = ex.module === 'brain' ? (state.brain[bKey]||{})[ex.id] : (state.ed[eKey]||{})[ex.id];
    if (d?.completed) done++;
  });
  showToast(`✅ ${ex.name} selesai! (${done}/${allEx.length} hari ini)`, 'success');
  scheduleReminder();
  render();
}

function countAllExercises(tab){
  let c = 0;
  for (const dayData of Object.values(state[tab])){
    c += Object.values(dayData).filter(d => d?.completed).length;
  }
  return c;
}

function totEx(tab){
  const c = countAllExercises(tab);
  return `${c} exercise`;
}

// ============================
// STREAK
// ============================
function calcStreak(tab){
  let streak = 0;
  for (let i=dayIndex(); i>=0; i--){
    const key = getDayKey(tab, i);
    const dayData = state[tab][key];
    if (!dayData) break;
    const exCount = Object.values(dayData).filter(d => d?.completed).length;
    if (exCount > 0) streak++;
    else break;
  }
  return streak;
}

function combinedStreak(){
  let streak = 0;
  for (let i=dayIndex(); i>=0; i--){
    const bk = getDayKey('brain', i), ek = getDayKey('ed', i);
    const bd = state.brain[bk]||{}, ed = state.ed[ek]||{};
    const all = [...Object.values(bd), ...Object.values(ed)];
    const done = all.filter(d => d?.completed).length;
    if (done > 0) streak++;
    else break;
  }
  return streak;
}

  const level = getLevel(dayIndex());
  const dur = scaleDur(ex.dur, level);

  let html = `<button class="modal-close" onclick="closeInfo()">✕</button>
    <h3>${ex.emoji} ${ex.name}</h3>
    <div class="modal-section"><h4>📖 Apa Itu</h4><p>${ex.explanation}</p></div>
    <div class="modal-section"><h4>🎯 Manfaat</h4><ul>${ex.benefits.map(b => `<li>${b}</li>`).join('')}</ul></div>
    <div class="modal-section"><h4>💡 Tips</h4><ul>${ex.tips.map(t => `<li>${t}</li>`).join('')}</ul></div>
    <div class="modal-section"><h4>⏱ Durasi Level ${level}</h4><p>Base: ${ex.dur} menit · Total: ${dur} menit (level × +5 menit)</p></div>`;
  if (ex.videoLinks && ex.videoLinks.length){
    html += `<div class="modal-section"><h4>🔗 Video Panduan</h4>`;
    ex.videoLinks.forEach(v => {
      html += `<div class="modal-video"><a href="${v.url}" target="_blank" rel="noopener">▶️ ${v.title}</a></div>`;
    });
    html += `</div>`;
  }
  html += `<div class="modal-section"><h4>📄 Referensi</h4><div class="modal-ref">${ex.ref}</div></div>`;

  content.innerHTML = html;
  el.classList.remove('hidden','closing');
  void el.offsetWidth;
  el.style.display = 'flex';
}

function closeInfo(){
  const el = document.getElementById('infoModal');
  el.classList.add('closing');
  setTimeout(() => { el.classList.add('hidden'); el.style.display = ''; }, 200);
}

// Close modal on overlay click
document.addEventListener('click', function(e){
  const modal = document.getElementById('infoModal');
  if (e.target === modal && !modal.classList.contains('hidden')){
    closeInfo();
  }
});

// ============================
// CALENDAR
// ============================
function renderCal(){
  const wrap = document.getElementById('calWrap');
  const today = dayIndex();
  let html = '<div class="cal-grid">';
  for (let i=0; i<365; i++){
    const bKey = getDayKey('brain', i), eKey = getDayKey('ed', i);
    const bDay = state.brain[bKey] || {}, eDay = state.ed[eKey] || {};
    const allEx = [...Object.values(bDay), ...Object.values(eDay)];
    const done = allEx.filter(d => d?.completed).length;
    const total = allEx.length;
    let cls = 'cal-day';
    if (i > today) cls += ' empty';
    else if (total > 0 && done === total) cls += ' done';
    else if (total > 0 && done > 0) cls += ' partial';
    else if (i < today) cls += ' miss';
    if (i === today) cls += ' today';
    const label = total > 0 ? `${done}/${total}` : (i < today ? '0' : '');
    html += `<div class="${cls}" title="Hari ${i+1}: ${label||'Belum'}">${i+1}</div>`;
  }
  html += '</div>';
  wrap.innerHTML = html;
}

function showCal(tab){
  state.calView = tab;
  renderCal();
}

// ============================
// STATS
// ============================
function renderStats(){
  const grid = document.getElementById('statsGrid');
  const brainEx = countAllExercises('brain');
  const edEx = countAllExercises('ed');
  const brainStreak = calcStreak('brain');
  const edStreak = calcStreak('ed');
  const totalEx = brainEx + edEx;
  const maxEx = (dayIndex()+1) * 2;
  const consist = maxEx > 0 ? Math.round(totalEx/maxEx*100) : 0;

  grid.innerHTML = `
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${brainEx}</div>
      <div class="slbl">🧠 Ex Otak</div>
    </div>
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${edEx}</div>
      <div class="slbl">❤️‍🔥 Ex ED</div>
    </div>
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${totalEx}</div>
      <div class="slbl">Total Exercise</div>
    </div>
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${brainStreak}</div>
      <div class="slbl">🔥 Streak Otak</div>
    </div>
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${edStreak}</div>
      <div class="slbl">🔥 Streak ED</div>
    </div>
    <div class="stat-item glass-card" style="padding:10px 4px">
      <div class="snum">${consist}%</div>
      <div class="slbl">📊 Konsistensi</div>
    </div>
  `;

  const chart = document.getElementById('chartBar');
  const weeks = Math.min(12, Math.ceil((dayIndex()+1)/7));
  let chartHtml = '';
  for (let w=0; w<weeks; w++){
    let b = 0, e = 0;
    for (let d=w*7; d<Math.min((w+1)*7, dayIndex()+1); d++){
      const bk = getDayKey('brain', d);
      const ek = getDayKey('ed', d);
      if (state.brain[bk]) b += Object.values(state.brain[bk]).filter(x => x?.completed).length;
      if (state.ed[ek]) e += Object.values(state.ed[ek]).filter(x => x?.completed).length;
    }
    const maxW = 14;
    const bh = Math.max(4, (b/maxW)*56);
    const eh = Math.max(4, (e/maxW)*56);
    chartHtml += `<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px">
      <div class="bar brain-bar" style="height:${bh}px" title="Otak: ${b}/14"></div>
      <div class="bar ed-bar" style="height:${eh}px" title="ED: ${e}/14"></div>
      <div class="bl">W${w+1}</div>
    </div>`;
  }
  chart.innerHTML = chartHtml;
}

// ============================
// JOURNAL
// ============================
function renderJournal(){
  const list = document.getElementById('journalList');
  const all = [];
  for (const tab of ['brain','ed']){
    for (const [key, dayData] of Object.entries(state[tab])){
      for (const [exId, exData] of Object.entries(dayData)){
        if (exData.completed && exData.note){
          const dayNum = parseInt(key.replace('day_',''))+1;
          all.push({ tab, dayNum, date: exData.completedAt, note: exData.note, exId });
        }
      }
    }
  }
  all.sort((a,b)=>new Date(b.date)-new Date(a.date));
  if (all.length===0){
    list.innerHTML = '<div class="empty-state">Belum ada catatan. Selesaikan latihan & tulis catatan!</div>';
    return;
  }
  list.innerHTML = all.slice(0,20).map(j => `
    <div class="journal-item">
      <div class="jdate">${j.tab==='brain'?'🧠':'❤️‍🔥'} Hari #${j.dayNum} · ${new Date(j.date).toLocaleDateString('id-ID')}</div>
      <div class="jnote">${j.note}</div>
    </div>
  `).join('');
}

// ============================
// NAVIGATION
// ============================
function showSection(section){
  state.currentSection = section;
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav===section));
  const sec = ['dashboard','settingsSection','todaySection','calSection','statsSection','journalSection'];
  const vis = { dashboard: section!=='settings', settingsSection: section==='settings',
    todaySection: section==='today', calSection: section==='cal',
    statsSection: section==='stats', journalSection: section==='journal' };
  sec.forEach(id => {
    const el = document.getElementById(id);
    if (!el) return;
    el.classList.toggle('hidden', !vis[id]);
    if (vis[id]) { el.classList.remove('fade-in'); void el.offsetWidth; el.classList.add('fade-in'); }
  });
  window.scrollTo({ top: 0, behavior: 'smooth' });
  render();
}

function updateNav(){
  document.querySelectorAll('.nav-item').forEach(n => n.classList.toggle('active', n.dataset.nav===state.currentSection));
}

// ============================
// SETTINGS
// ============================
function saveSettings(){
  const name = document.getElementById('userName')?.value || 'User';
  const time = document.getElementById('reminderTime')?.value || '08:00';
  state.settings.name = name;
  state.settings.reminderTime = time;
  saveState();
}

function toggleTheme(){
  state.settings.dark = !state.settings.dark;
  document.documentElement.setAttribute('data-theme', state.settings.dark?'dark':'');
  saveState();
  render();
}

function toggleReminder(){
  state.settings.reminder = !state.settings.reminder;
  document.getElementById('reminderToggle').classList.toggle('on', state.settings.reminder);
  saveState();
  if (state.settings.reminder) scheduleReminder();
}

function requestNotif(){
  if ('Notification' in window){
    Notification.requestPermission().then(perm => {
      showToast(perm==='granted'?'Notifikasi diizinkan ✅':'Notifikasi ditolak','success');
    });
  }
}

function scheduleReminder(){
  if (!state.settings.reminder) return;
  if (!('Notification' in window) || Notification.permission !== 'granted') return;
  const now = new Date();
  const [h,m] = state.settings.reminderTime.split(':').map(Number);
  const target = new Date(now);
  target.setHours(h,m,0,0);
  if (target <= now) target.setDate(target.getDate()+1);
  const ms = target - now;
  setTimeout(() => {
    new Notification('NeuroFit 365', {
      body: 'Waktunya latihan 🧠 Otak + ❤️‍🔥 ED! Jangan putus streak!',
      icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100"><text y="80" font-size="80">🧠</text></svg>'
    });
    scheduleReminder();
  }, ms);
}

function resetData(){
  if (!confirm('Hapus semua data progress? Tindakan ini tidak bisa dibatalkan!')) return;
  state.brain = {};
  state.ed = {};
  const d = new Date(); d.setDate(d.getDate()+1); state.startDate = d.toISOString().split('T')[0];
  saveState();
  render();
  showToast('Data berhasil direset','success');
}

function exportData(silent){
  const data = {
    version: '2.0',
    exportedAt: new Date().toISOString(),
    startDate: state.startDate,
    brain: state.brain,
    ed: state.ed,
    settings: { name: state.settings.name, reminderTime: state.settings.reminderTime }
  };
  const blob = new Blob([JSON.stringify(data,null,2)], {type:'application/json'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `NeuroFit365_backup_${new Date().toISOString().split('T')[0]}.json`;
  a.click();
  if (!silent) showToast('Data berhasil di-download ✅','success');
}

function showToast(msg, type=''){
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast show '+(type||'');
  clearTimeout(el._t);
  el._t = setTimeout(() => el.classList.remove('show'), 3000);
}

// ============================
// INIT
// ============================
function init(){
  migrateData();
  if (state.settings.dark) document.documentElement.setAttribute('data-theme','dark');
  document.getElementById('reminderToggle').classList.toggle('on', state.settings.reminder);
  document.getElementById('reminderTime').value = state.settings.reminderTime;
  document.getElementById('userName').value = state.settings.name;
  render();
  if (state.settings.reminder) scheduleReminder();
  showToast('🧠 NeuroFit 365 siap! Semangat latihan!');
}

document.addEventListener('DOMContentLoaded', init);
</script>
